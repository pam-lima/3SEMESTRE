<ul>
    <p class="title">Alunos:</p>
    <li *ngFor="let n of nome; index as indice1" class="nome"> {{n}} - {{indice1 + 1}} </li>
    <p>Super-Heróis:</p>
    <li *ngFor="let n of superHerois ; index as indice2" class="superHerois"> {{n}} - {{indice2 + 1}} </li>
    <p>Vilões:</p>
    <li *ngFor="let n of vilao ; index as indice3" class="vilao"> {{n}} - {{indice3 + 1}} </li>
</ul>
